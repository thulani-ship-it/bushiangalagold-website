<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 68" width="220" height="68" role="img" aria-label="Red Black Marketing">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&amp;display=swap');
    </style>
  </defs>
  <!-- RED -->
  <text
    x="110" y="38"
    font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
    font-size="42"
    font-weight="900"
    fill="#C8111A"
    text-anchor="middle"
    letter-spacing="6">RED</text>
  <!-- BLACK -->
  <text
    x="110" y="56"
    font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="700"
    fill="#5A5A5A"
    text-anchor="middle"
    letter-spacing="5">BLACK</text>
  <!-- MARKETING -->
  <text
    x="110" y="67"
    font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
    font-size="8"
